<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Work 8</title>
    <link rel="stylesheet" href="src/output.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="bg-[#F0F0F0]">
    <header class="flex p-5 items-center justify-between lg:max-w-300 lg:m-auto">
        <div class="flex items-center gap-10">
            <img src="src/img/header/logo.png" alt="">
            <nav class="hidden lg:flex gap-5">
                <p>About us</p>
                <p>How it works</p>
                <p>Pricing</p>
                <p>FAQs</p>
            </nav>
        </div>
        <i class="text-[20px] fa-solid fa-bars lg:hidden!"></i>
        <div class="lg:flex gap-4 hidden">
            <button class="py-2 px-5">Login</button>
            <button class="bg-[black] text-[white] py-2 px-5">Sign Up</button>
        </div>
    </header>
    <section class="p-5 flex flex-col gap-12 lg:flex-row items-center justify-between lg:max-w-300 lg:m-auto lg:py-25">
        <aside class="flex flex-col gap-8 lg:w-[600px]">
            <h3 class="text-[32px] text-[#151515] lg:text-[60px]">Always Track & Analyze Your Business Statistics To Succeed.</h3>
            <p class="text-[22px]">A better way to manage your sales, team, clients & marketing <br> — on a single platform. Powerful, affordable & easy.</p>
            <form class="flex lg:mb-5">
                <input class="border w-[60%] bg-[white] lg:px-5 lg:w-70 p-3 text-center border-[black] placeholder:text-[black] text-[20px] lg:text-start lg:p-2" type="email" placeholder="Enter your email">
                <button class="w-[40%] p-3 bg-[#151515] text-[white] text-[18px] lg:p-2 lg:w-50">Get started</button>
            </form>
            <div class="flex gap-10">
                <img src="src/img/section1/img1.png" alt="">
                <img src="src/img/section1/img2.png" alt="">
                <img src="src/img/section1/img3.png" alt="">
            </div>
        </aside>
        <img class="lg:w-[40%]" src="src/img/section1/osnimg.png" alt="">
    </section>
</body>
</html>
